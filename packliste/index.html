<!DOCTYPE html>

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
	<title>Packliste</title>
	<link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📋</text></svg>"/>
</head>

<body>
	<style>
		input[type=checkbox]:checked + label.strikethrough {
			text-decoration: line-through;
			color: #999999;
		}
	</style>
	<header>
		<nav class="navbar fixed-top navbar-dark bg-dark">
			<div class="container-fluid">
				<h1 class="navbar-brand mb-0">Packliste</h1>
			</div>
		</nav>
	</header>
	<main class="container">
		<div id="packlistenContainer" class="list-group mb-5" style="margin-top: 50px;">
		</div>
	</main>

	<script type="text/javascript">
		var lists = [
			{	name: "Basics",
				items: [
					"Unterhosen",
					"Socken kurz / lang",
					"Hosen kurz / lang",
					"Shirts kurz / lang",
					"Hemd",
					"Pulli / Fleece",
					"Gürtel",
					"Kappe",
					"Buff / Schal / Haube / Handschuhe",
					"Regenjacke",
					"Div. Schuhe",
					"Wasserflasche",
					"Reisepass / Impfpass / Bargeld / Tickets",
					"Sonnenbrille",
					"Stift + Notizbuch"
				]
			}, {name: "Hygiene",
				items: [
					"Zahnbürste & -pasta",
					"Shampoo + Deo",
					"Handtuch (Strand / groß / klein)",
					"Taschentücher / feuchte TT",
					"Rasierer / Pinzette / Wattestäbchen / Nagelknipser",
					"Oropax",
					"Schmerzmittel",
					"(Wund-) Desinfekt",
					"Blasenpflaster / Tape / EH-Set",
					"Sonnencreme + Labello + After Sun"
				]
			}, {name: "Sport",
				items: [
					"Sportshirt, -shorts, -socken",
					"Sportschuhe",
					"Badehose",
					"Flip Flops",
					"Wanderschuhe, -socken"
				]
			}, {name: "Draußen schlafen",
				items: [
					"Taschenmesser",
					"Feuerzeug",
					"Gaskocher + Becher + Göffel",
					"Kaffee + Gewürze",
					"Gaffaband + Superkleber",
					"Stirnlampe / Lampe",
					"Zelt / Tarp / Hängematte",
					"Schlafsack / Kissen / Biwaksack",
					"Isomatte",
					"Campingsessel",
					"Nähzeug"
				]
			}, {name: "Bikepacking",
				items: [
					"Wasserflaschen",
					"Wahoo",
					"Lichter",
					"Flickzeug + Reifenheber + Schlauch + Dichtmilch",
					"Pumpe",
					"Multitool",
					"Kettenwachs /-öl",
					"Radhosen",
					"Radbrille",
					"Radhandschuhe",
					"Helm"
				]
			}, {name: "Elektronik",
				items: [
					"Ladegerät + Ladekabel",
					"Powerbank",
					"Kopfhörer",
					"Stromadapter",
					"Kamera (analog / digital)",
					"Film / Speicherkarte",
				]
			}, {name: "ToDo",
				items: [
					"Laden: Powerbank / Kamera / Kopfhörer / Laptop",
					"Haare schneiden",
					"Rasieren",
					"Nägel knipsen",
					"Pflanzen gießen",
					"Müll rausbringen",
					"Kühlschrank + Geschirrspüler leeren",
					"Heizung runterdrehen",
					"Auto bereit machen (Ölstand / Reifendruck)"
				]
			}
		];
		html = "";
		teile = 0;

		function createCheck(thing) {
			return	'<label class="list-group-item">' +
						'<input type="checkbox" class="form-check-input me-2" id="' + thing + '">' +
						'<label for="' + thing + '" class="strikethrough">' + thing + '</label>' +
					'</label>';
		}

		function createList(packliste) {
			html += '<h2 class="h4 mt-2">' + packliste.name + '</h2>';
			html += '<div id="packliste' + teile++ + '" class="list-group mb-3">';
			packliste.items.forEach(thing => html += createCheck(thing));
			html += '</div>';
		}

		lists.forEach(packliste => createList(packliste));
		document.getElementById("packlistenContainer").innerHTML = html;
	</script>
</body>
